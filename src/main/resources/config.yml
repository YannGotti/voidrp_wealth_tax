# Интервал между сборами налогов в часах. 168 = 1 неделя.
interval-hours: 168

# Уведомлять ли онлайн-игроков при списании налога
notify-online: true

# Записывать каждое списание в консоль
log-to-console: true

# Прогрессивные налоговые ставки.
# threshold — нижняя граница скобки (₽), rate — доля от суммы в этой скобке.
# Пример: при балансе 1 000 000₽:
#   0–100k:      0%  →      0₽
#   100k–500k:   2%  →  8 000₽
#   500k–1M:     5%  → 25 000₽
#   Итого: 33 000₽ в неделю
tiers:
  - threshold: 0
    rate: 0.00
  - threshold: 100000
    rate: 0.02
  - threshold: 500000
    rate: 0.05
  - threshold: 2000000
    rate: 0.10
